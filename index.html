<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>novelty</title>
  <style>
    /* CSS for the blog */
    body {
      margin: 0;
      padding: 0;
      font-family: 'helvetica', serif;
      background-color: #175f17; /* Green background color */
    }

    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
    }

    header {
      text-align: center;
      padding: 20px;
      background: rgba(1, 50, 32, 0.9);
      color: white;
    }

    .sidebar {
      width: 20%;
      float: left;
      margin-right: 20px;
      background-color: #819b0c; /* Light green sidebar */
    }

    .content {
      width: 75%;
      float: right;
    }

    .post {
      border-bottom: 1px solid #98FB98;
      padding: 20px 0;
      margin-bottom: 20px;
    }

    footer {
      clear: both;
      text-align: center;
      padding: 20px;
      background-color: #0f3303;
      color: white;
    }
    
    .rain-drop {
      position: absolute;
      width: 5px;
      height: 10px;
      background: gold;
      border-radius: 50%;
      animation: rain 2s linear infinite;
    }

    @keyframes rain {
      0% { transform: translateY(-100%) scale(1); }
      100% { transform: translateY(100%) scale(0.7); opacity: 0; }
    }

    .tag-cloud {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .tag-cloud li {
      display: inline-block;
      margin-right: 10px;
    }

    .tag-cloud a {
      color: white;
      text-decoration: none;
    }

    .tag-cloud a:hover {
      color: gold;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>novelty</h1>
    </header>

    <div class="sidebar">
      <!-- Sidebar content here -->
      <ul id="sidebar-nav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Ceramics</a></li>
        <li><a href="#">Photography</a></li>
        <li><a href="#">Travel</a></li>
        <li><a href="#">Tags</a>
          <ul class="tag-cloud">
            <li><a href="#" data-tag="ceramics">Ceramics</a></li>
            <li><a href="#" data-tag="photography">Photography</a></li>
            <li><a href="#" data-tag="travel">Travel</a></li>
          </ul>
        </li>
      </ul>
    </div>

    <div class="content">
      <!-- Blog posts here -->
      <div class="post" id="post-1">
        <h2>New Post: Title Here</h2>
        <p>Content goes here...</p>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; jack hitchins. 2026.</p>
  </footer>
  
  <script>
function filterPostsByTag(tag) {
  const posts = document.querySelectorAll('.post');
  posts.forEach(post => {
    if (post.dataset.tag === tag || post.dataset.tag === '') {
      post.style.display = 'block';
    } else {
      post.style.display = 'none';
    }
  });
}

// Initial load
filterPostsByTag(''); // Show all posts

// Add event listeners to tags in the sidebar
document.querySelectorAll('#sidebar-nav .tag-cloud a').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    e.preventDefault();
    const tag = this.getAttribute('data-tag');
    filterPostsByTag(tag);
  });
});
</script>

  <!-- Raindrop elements -->
  <script>
    function createRainDrops() {
      const container = document.querySelector('.container');
      for (let i = 0; i < 50; i++) {
        const rainDrop = document.createElement('div');
        rainDrop.classList.add('rain-drop');
        // Position the rain drop randomly
        rainDrop.style.left = `${Math.random() * 100}%`;
        rainDrop.style.top = `-${20 + (i * 5)}%`; // Start above the container
        container.appendChild(rainDrop);
      }
    }

    window.onload = createRainDrops;
  </script>
</body>
</html>
